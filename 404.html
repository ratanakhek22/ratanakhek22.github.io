<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error Page</title>
    <style>
      body {
        display: flex;
        flex-flow: column nowrap;
        align-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue",
          sans-serif;
      }

      .container {
        margin-top: 30vh;
        display: flex;
        flex-flow: column nowrap;
        align-items: center;
      }

      .main {
        font-weight: 700;
        font-size: 4rem;
      }

      .text {
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="main">Error 404</div>
      <div class="text">You have entered the wrong url/code</div>
      <div class="text">Try again!</div>
    </div>
  </body>
</html>
