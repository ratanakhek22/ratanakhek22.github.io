<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BingoLOL</title>
  <link rel="stylesheet" href="styles.css"/>
  <script src="./logic.js"></script>
  </head>
  <body>
    <div id="main">
      <div id="container-top">
        <div id="board-container">
            
        </div>
        <div id="square-bank">
            
        </div>
      </div>
      <div id="container-bot">
        <div id="buttons-container">
          <button id="lock-btn">Lock In Board</button>
        </div>
      </div>
      <div id="container-bot">
        <form id="file-upload">
          <label for="file">Select a save file:</label>
          <input type="file" id="file" name="file">
          <button type="submit">Upload</button>
        </form>
        <p id="score-counter" hidden>Score: 0</p>
      </div>
      <div id="bet-container">
        <div id="bet-box-1">
          <p id="bet-title">Bet Box</p>
          <p id="bet-tracker">Betting Points: 8</p>
        </div>
        <div id="bet-box-2">
          <div id="blue-team">
            <p class="team-txt">Blue Team</p>
          </div>
          <div id="red-team">
            <p class="team-txt">Red Team</p>
          </div>
        </div>
        <div id="bet-box-3">
          <button class="submit-btn" id="blue-submit">Blue Won</button>
          <button class="submit-btn" id="red-submit">Red Won</button>
        </div>
      </div>
    </div>
  </body>
</html>
